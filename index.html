<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist</title>
    <!-- นำเข้า Google Fonts เพื่อความสวยงาม -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Charm:wght@400;700&family=Anuphan:wght@300;400;500&display=swap" rel="stylesheet">
    <!-- เชื่อมต่อไฟล์ CSS แยก -->
    <link rel="stylesheet" href="st.css">
</head>
<body>

    <!-- ================= ส่วนแรก (หน้าปกโปรไฟล์) ================= -->
    <header class="navbar">
        <button class="nav-btn">friends</button>
        <span class="nav-title">Me</span>
        <button class="nav-btn">playlist</button>
    </header>

    <main class="hero-container">
        <div class="header-titles">
            <span class="date-tag">40<br>04</span>
            <div class="title-group">
                <h1 class="main-title">IS ME<br><span class="subtitle">SASINANTA</span></h1>
                <p class="personal-name">ศศินันทา เกิดพงษ์ (มิลค์)</p>
            </div>
            <span class="date-tag">40<br>04</span>
        </div>

        <div class="profile-section">
            <div class="avatar"></div>
            <span class="profile-name">BY มิลค์</span>
        </div>

        <!-- ส่วนใส่รูปภาพหลัก -->
        <div class="main-image-wrapper">
            <img src="download (1).jpg" alt="Featured Image" class="featured-image">
        </div>

        <!-- 📸 ส่วนรูปภาพย่อย 4 รูปที่เพิ่มเข้ามาใหม่ -->
        <div class="sub-images-grid">
            <div class="sub-image-card">
                <img src="image1.jpg" alt="Milk Photo 1" class="sub-image">
            </div>
            <div class="sub-image-card">
                <img src="image2.jpg" alt="Milk Photo 2" class="sub-image">
            </div>
            <div class="sub-image-card">
                <img src="image3.jpg" alt="Milk Photo 3" class="sub-image">
            </div>
            <div class="sub-image-card">
                <img src="image4.jpg" alt="Milk Photo 4" class="sub-image">
            </div>
        </div>
        
        <p class="credits-text">by Milk</p>
    </main>

    <!-- ================= ส่วนที่สอง: PLAYLIST (สไตล์แนวนอนตามรูปภาพตัวอย่าง) ================= -->
    <section class="playlist-section">
        <h2 class="playlist-heading">Playlist</h2>
        
        <div class="playlist-grid horizontal-layout">
            <!-- เพลงที่ 1 -->
            <div class="player-card horizontal-card" data-video-id="https://youtu.be/xS_E7WzPjvE?si=3sMY_ijG9w5nwgv9">
                <div class="card-inner">
                    <!-- ฝั่งซ้าย: ตัวเล่นวิดีโอ (YouTube Iframe) -->
                    <div class="song-thumb-container">
                        <iframe 
                            id="yt-player-1"
                            class="youtube-video-frame" 
                            src="" 
                            title="YouTube video player" 
                            frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                            allowfullscreen>
                        </iframe>
                    </div>
                    
                    <!-- ฝั่งขวา: ข้อมูลเพลงและลำดับ -->
                    <div class="song-info-container">
                        <div class="song-header">
                            <span class="song-number">#1</span>
                        </div>
                        <h3 class="song-title">Love Me</h3>
                        <div class="controls">
                            <button class="control-btn play-btn">▶</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- เพลงที่ 2 -->
            <div class="player-card horizontal-card" data-video-id="https://youtu.be/7CUz7Ec7cWc?si=ok-v6BYCAjcpnJ5u">
                <div class="card-inner">
                    <!-- ฝั่งซ้าย: ตัวเล่นวิดีโอ (YouTube Iframe) -->
                    <div class="song-thumb-container">
                        <iframe 
                            id="yt-player-2"
                            class="youtube-video-frame" 
                            src="" 
                            title="YouTube video player" 
                            frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                            allowfullscreen>
                        </iframe>
                    </div>
                    
                    <!-- ฝั่งขวา: ข้อมูลเพลงและลำดับ -->
                    <div class="song-info-container">
                        <div class="song-header">
                            <span class="song-number">#2</span>
                        </div>
                        <h3 class="song-title">hate that i made you love me</h3>
                        <div class="controls">
                            <button class="control-btn play-btn">▶</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- เชื่อมต่อสคริปต์ปกติ -->
    <script src="script.js"></script>
</body>
</html>
