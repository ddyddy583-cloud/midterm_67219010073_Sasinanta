<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist</title>
    <!-- นำเข้า Google Fonts เพื่อความสวยงาม -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Charm:wght@400;700&family=Anuphan:wght@300;400;500&display=swap" rel="stylesheet">
    <!-- เชื่อมต่อไฟล์ CSS แยก -->
    <link rel="stylesheet" href="st.css">
</head>
<body>

    <!-- ================= ส่วนแรก (หน้าปกโปรไฟล์) ================= -->
    <header class="navbar">
        <button class="nav-btn">friends</button>
        <span class="nav-title">Me</span>
        <button class="nav-btn">playlist</button>
    </header>

    <main class="hero-container">
        <div class="header-titles">
            <span class="date-tag">40<br>04</span>
            <h1 class="main-title">IS ME<br><span class="subtitle">SASINANTA</span></h1>
            <span class="date-tag">40<br>04</span>
        </div>

        <div class="profile-section">
            <div class="avatar"></div>
            <span class="profile-name">BY มิลค์</span>
        </div>

        <!-- ส่วนใส่รูปภาพหลัก -->
        <div class="main-image-wrapper">
            <img src="download (1).jpg" alt="Featured Image" class="featured-image">
        </div>
        
        <p class="credits-text">by Milk</p>
    </main>

    <!-- ================= ส่วนที่สอง: PLAYLIST ================= -->
    <section class="playlist-section">
        <h2 class="playlist-heading">Playlist</h2>
        
        <div class="playlist-grid">
            <!-- เพลงที่ 1 -->
            <div class="player-card" data-video-id="https://youtu.be/xS_E7WzPjvE?si=3e_RJAEwQj_a0DzM">
                <div class="card-inner">
                    <div class="song-thumb-container">
                        <iframe 
                            id="yt-player-1"
                            class="youtube-video-frame" 
                            src="" 
                            title="YouTube video player" 
                            frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                            allowfullscreen>
                        </iframe>
                    </div>
                    
                    <h3 class="song-title">Love Me</h3>
                    <div class="progress-bar-container">
                        <div class="progress-bar"></div>
                        <div class="progress-dot"></div>
                    </div>
                    <div class="controls">
                        <button class="control-btn prev-btn">⏮</button>
                        <button class="control-btn play-btn">▶</button>
                        <button class="control-btn next-btn">⏭</button>
                    </div>
                </div>
            </div>

            <!-- เพลงที่ 2 -->
            <div class="player-card" data-video-id="https://youtu.be/7CUz7Ec7cWc?si=UfTj1lG25_fp5Li_">
                <div class="card-inner">
                    <div class="song-thumb-container">
                        <iframe 
                            id="yt-player-2"
                            class="youtube-video-frame" 
                            src="" 
                            title="YouTube video player" 
                            frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                            allowfullscreen>
                        </iframe>
                    </div>
                    
                    <h3 class="song-title">hate that i made you love me</h3>
                    <div class="progress-bar-container">
                        <div class="progress-bar"></div>
                        <div class="progress-dot"></div>
                    </div>
                    <div class="controls">
                        <button class="control-btn prev-btn">⏮</button>
                        <button class="control-btn play-btn">▶</button>
                        <button class="control-btn next-btn">⏭</button>
                    </div>
                </div>
            </div>
        </div> <!-- ปิด playlist-grid ถูกตำแหน่งแล้ว -->
    </section>

    <!-- เชื่อมต่อสคริปต์ปกติ -->
    <script src="script.js"></script>
</body>
</html>
