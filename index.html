<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Playlist</title>
    <!-- นำเข้า Google Fonts เพื่อความสวยงาม -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Charm:wght@400;700&family=Anuphan:wght@300;400;500&display=swap" rel="stylesheet">
    <!-- เชื่อมต่อไฟล์ CSS แยก -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ================= ส่วนแรก (อิงจากภาพ 4122d33697020674537a5e82c28eee96.jpg) ================= -->
    <header class="navbar">
        <button class="nav-btn">friends</button>
        <span class="nav-title">Me</span>
        <button class="nav-btn">playlist</button>
    </header>

    <main class="hero-container">
        <div class="header-titles">
            <span class="date-tag">40<br>04</span>
            <h1 class="main-title">IS ME<br><span class="subtitle">SASINANTA</span></h1>
            <span class="date-tag">40<br>04</span>
        </div>

        <div class="profile-section">
            <div class="avatar"></div>
            <span class="profile-name">BY MIlK</span>
        </div>

        <!-- ส่วนใส่รูปภาพหลักตามที่คุณต้องการ -->
        <div class="main-image-wrapper">
            <img src="https:download (1).jpg alt="Featured Image  class="featured-image">
        </div>
        
        <p class="credits-text">by roussacea</p>
    </main>


    <!-- ================= ส่วนที่สอง: PLAYLIST (อิงจากภาพ 636a5b619a570cfa293c3f61cb0a2425.jpg) ================= -->
    <section class="playlist-section">
        <h2 class="playlist-heading">Playlist</h2>
        
<div class="playlist-grid">
            <!-- เพลงที่ 1 -->
            <div class="player-card" data-video-url="https://youtu.be/5192ZvLucME?si=jTE264O52jCHfZFq">
                <div class="card-inner">
                    <div class="song-thumb-container">
                        <!-- มีการระบุ id ให้ iframe เพื่อให้ระบบดึงไปคุมและส่งสัญญาณได้เสร็จสรรพ -->
                        <iframe 
                            id="yt-player-1"
                            class="youtube-video-frame" 
                            src="" 
                            title="YouTube video player" 
                            frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                            allowfullscreen>
                        </iframe>
                    </div>
                    
                    <h3 class="song-title">dracula (slowed+reverb)</h3>
                    <div class="progress-bar-container">
                        <div class="progress-bar"></div>
                        <div class="progress-dot"></div>
                    </div>
                    <div class="controls">
                        <button class="control-btn prev-btn">⏮</button>
                        <button class="control-btn play-btn">▶</button>
                        <button class="control-btn next-btn">⏭</button>
                    </div>
                </div>
            </div>

            <!-- เพลงที่ 2 -->
            <div class="player-card" data-video-url="https://youtu.be/5192ZvLucME?si=jTE264O52jCHfZFq">
                <div class="card-inner">
                    <div class="song-thumb-container">
                        <iframe 
                            id="yt-player-2"
                            class="youtube-video-frame" 
                            src="" 
                            title="YouTube video player" 
                            frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                            allowfullscreen>
                        </iframe>
                    </div>
                    
                    <h3 class="song-title">dracula (slowed+reverb)</h3>
                    <div class="progress-bar-container">
                        <div class="progress-bar"></div>
                        <div class="progress-dot"></div>
                    </div>
                    <div class="controls">
                        <button class="control-btn prev-btn">⏮</button>
                        <button class="control-btn play-btn">▶</button>
                        <button class="control-btn next-btn">⏭</button>
                    </div>
                </div>
            </div>

            <!-- เพลงที่ 3 -->
            <div class="player-card" data-video-url="https://youtu.be/5192ZvLucME?si=jTE264O52jCHfZFq">
                <div class="card-inner">
                    <div class="song-thumb-container">
                        <iframe 
                            id="yt-player-3"
                            class="youtube-video-frame" 
                            src="" 
                            title="YouTube video player" 
                            frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                            allowfullscreen>
                        </iframe>
                    </div>
                    
                    <h3 class="song-title">dracula (slowed+reverb)</h3>
                    <div class="progress-bar-container">
                        <div class="progress-bar"></div>
                        <div class="progress-dot"></div>
                    </div>
                    <div class="controls">
                        <button class="control-btn prev-btn">⏮</button>
                        <button class="control-btn play-btn">▶</button>
                        <button class="control-btn next-btn">⏭</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- ลบแท็กดิฟเปล่าตัวเก่าออก แล้วเชื่อมต่อสคริปต์ปกติ -->
    <script src="script.js"></script>
</body>
</html>
